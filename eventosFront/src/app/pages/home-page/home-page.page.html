<ion-header [translucent]="true">
  <ion-toolbar style="padding: 5px;">
    <ion-searchbar [formControl]="searchControl" color="light" placeholder="Procurar eventos"></ion-searchbar>
  </ion-toolbar>
  <ion-list>
    <ion-item *ngFor="let event of searchResults" (click)="goToEventDetails(event.eventsId)" >
      <ion-label>{{ event.eventName }}</ion-label>
    </ion-item>
  </ion-list>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content pullingIcon="arrow-down-circle-outline" refreshingSpinner="circular">
    </ion-refresher-content>
  </ion-refresher>
  <h2 style="padding: 5px;">Eventos mais recentes</h2>
  <swiper-container
    (slidechange)="swiperSlideChanged($event)"
    [loop]="true"
    [pagination]="{
      clickable: true
    }"
    [slidesPerView]="1.2"
    [spaceBetween]="1">
  <swiper-slide *ngFor="let event of events" style="padding: 20px;" (click)="goToEventDetails(event.eventsId)">
    <ion-card class="event-card">
      <img [alt]="event.eventName" [src]="event?.imgEvent" style="height: 150px; width: 100%;" />
      <ion-card-header style="padding: 10px;">
        <ion-card-title>{{ event?.eventName }}</ion-card-title>
        <ion-card-subtitle>{{ event?.centerName }}</ion-card-subtitle>
      </ion-card-header>
  </ion-card>
  </swiper-slide>
</swiper-container>
<swiper-container

    (slidechange)="swiperSlideChanged($event)"
    [loop]="true"
    [pagination]="true"
    [slidesPerView]="2.5"
    [spaceBetween]="0.5">
  <swiper-slide *ngFor="let category of categorys" class="swiper-slide-custom">
    <ion-button size="large" shape="round" (click)="goToCategory(category.CategoryName)">
      <img [src]="category.imgAsset" class="category-img">
    </ion-button>
    <p class="category-text">{{ category.CategoryName }}</p>
  </swiper-slide>
</swiper-container>

<h2 style="padding: 5px;">Eventos mais favoritados</h2>
  <swiper-container
    (slidechange)="swiperSlideChanged($event)"
    [loop]="true"
    [pagination]="{
      clickable: true
    }"
    [slidesPerView]="1.2"
    [spaceBetween]="1">
  <swiper-slide *ngFor="let events of eventsBookmarks" style="padding: 20px;" (click)="goToEventDetails(events.eventsId)">
    <ion-card class="event-card">
      <img [alt]="events.eventName" [src]="events.imgEvent" style="height: 150px; width: 100%;" />
      <ion-card-header style="padding: 10px;">
        <ion-card-title>{{ events.eventName }}</ion-card-title>
        <ion-card-subtitle>{{ events.centerName }}</ion-card-subtitle>
      </ion-card-header>
  </ion-card>
  </swiper-slide>
</swiper-container>


</ion-content>
