<ion-tabs>

  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" href="/tabs/home">
      <ion-icon aria-hidden="true" name="home"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="bookmarks" [href]="'/tabs/bookmarks/' + userId">
      <ion-icon aria-hidden="true" name="heart"></ion-icon>
      <ion-label>Favoritos</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="reminders" [href]="'/tabs/reminder/' + userId">
      <ion-icon aria-hidden="true" name="alarm"></ion-icon>
      <ion-label>Lembretes</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="user" href="/tabs/tab3">
      <ion-icon aria-hidden="true" name="person-circle"></ion-icon>
      <ion-label>Usuario</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

</ion-tabs>
