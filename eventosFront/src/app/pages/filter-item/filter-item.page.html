<ion-header [translucent]="true">
  <ion-toolbar style="background-color: #f6f7f9">
    <ion-buttons slot="start">
      <ion-button routerLink="">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-img style="height: 40px; margin-right: 14%" src="../assets/logo.png"></ion-img>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <h1 style="justify-content: center; padding: 5%;">{{categoryType}}</h1>
  <hr style="background-color: #8c8c8c; margin: 10px; border-radius: 10px">
  <ion-list>
    <ion-item *ngFor="let event of events" (click)="goToEventDetails(event?.eventsId)">
      <ion-card class="event-card">
      <img [alt]="event?.eventName" [src]="event?.imgEvent" style="height: 150px; width: 100%;" />
      <ion-card-header style="padding: 10px;">
        <ion-card-title>{{ event?.eventName }}</ion-card-title>
        <ion-card-subtitle>{{ event?.centerName }}</ion-card-subtitle>
      </ion-card-header>
    </ion-card>
    </ion-item>
  </ion-list>
</ion-content>
