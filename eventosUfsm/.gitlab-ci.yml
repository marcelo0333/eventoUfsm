stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: "docker.io"
  DOCKER_IMAGE_NAME: "marcelomw3/backend"
  DOCKER_TAG: "latest"

# Etapa de Build
build:
  stage: build
  image: maven:3.8.4-openjdk-11
  services:
    - docker:dind
  script:
    - echo "Construindo o projeto Spring Boot com Maven"
    - mvn clean install -DskipTests
    - echo "Construção do projeto finalizada"
    - echo "Construindo a imagem Docker"
    - docker build -t $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG .
    - echo "Imagem Docker criada com sucesso"
  only:
    - dev

deploy:
  stage: deploy
  image: docker:latest
  script:
    - echo "Iniciando o deploy"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG
    - echo "Imagem Docker enviada para o Docker Hub"
    - ssh user@servidor "docker pull $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG && docker run -d --name eventosUfsm-backend -p 9090:9090 $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$DOCKER_TAG"
  only:
    - main